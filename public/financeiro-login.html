<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Urbann — Login</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(10, 10, 10, 0.82);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f5f4f0;
      --muted: rgba(245, 244, 240, 0.58);
      --soft: rgba(245, 244, 240, 0.18);
      --input: rgba(255, 255, 255, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.8);
    }

    .mask {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.62) 0%, rgba(0, 0, 0, 0.82) 100%),
        radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 44%);
    }

    .stack {
      position: relative;
      z-index: 1;
      width: min(100%, 440px);
      display: grid;
      gap: 22px;
      transform: translateY(-8vh);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
    }

    .logo-wrap img {
      width: min(100%, 260px);
      height: auto;
      display: block;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 32px 30px 28px;
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
    }

    .copy {
      display: grid;
      gap: 8px;
      margin-bottom: 20px;
    }

    .kicker {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }

    input {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: var(--input);
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.06);
    }

    input::placeholder {
      color: rgba(245, 244, 240, 0.34);
    }

    .submit {
      height: 48px;
      border: 0;
      border-radius: 12px;
      background: #fff;
      color: #050505;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .submit:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .error {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      color: #ff8d8d;
    }

    .error.show {
      display: block;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      font-size: 12px;
    }

    .linkish {
      border: 0;
      padding: 0;
      background: none;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
    }

    .signup {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .signup button {
      border: 0;
      background: none;
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <video class="video" autoplay muted loop playsinline>
      <source src="/urbann-bg.mp4" type="video/mp4">
    </video>
    <div class="mask"></div>

    <section class="stack">
      <div class="logo-wrap">
        <img src="/urbann-logo.png" alt="Urbann">
      </div>

      <div class="card">
        <div class="copy">
          <div class="kicker">Urbann</div>
          <h1 class="title">Acesse sua conta</h1>
          <p class="subtitle">Entre para gerenciar corridas, clientes e ganhos em um só lugar.</p>
        </div>

        <form id="loginForm">
          <label>
            E-mail
            <input id="email" type="email" placeholder="123@g.com" autocomplete="username">
          </label>

          <label>
            Senha
            <input id="password" type="password" placeholder="123" autocomplete="current-password">
          </label>

          <button class="submit" type="submit">Entrar</button>
        </form>

        <p class="hint">Use <strong>123@g.com</strong> e senha <strong>123</strong>.</p>
        <p class="error" id="errorMessage">Login inválido. Confira o e-mail e a senha.</p>

        <div class="actions">
          <button class="linkish" type="button">Esqueci minha senha</button>
          <button class="linkish" type="button">Entrar com Código</button>
        </div>

        <p class="signup">Não tem conta?<button type="button">Crie agora mesmo</button></p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (email === "123@g.com" && password === "123") {
        window.location.href = "/Financeiro/painel";
        return;
      }

      errorMessage.classList.add("show");
    });
  </script>
</body>
</html>

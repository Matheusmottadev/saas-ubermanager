services:
  postgres:
    image: postgres:16-alpine
    container_name: urbann-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbann_local
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urbann_local"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
